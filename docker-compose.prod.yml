# Production-serving override. Builds the frontend to a static bundle and
# serves it with nginx (gzip + immutable asset caching) instead of the Vite
# dev server, and turns on the fronting nginx's gzip for API responses.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Plain `docker compose up` still uses the dev stack (Vite HMR) for local work.
services:
  frontend:
    build:
      context: ./frontend
      target: production
    # Serve the built bundle; overrides the dev stage's `npm run dev` command.
    command: ["nginx", "-g", "daemon off;"]
