# Static server for the production build. Listens on 5173 so the fronting
# nginx proxies `/` to frontend:5173 unchanged whether this is dev (Vite) or
# prod (this server).
server {
    listen 5173;
    server_name localhost;
    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Vite emits content-hashed filenames under /assets, so they are safe to
    # cache forever — a new deploy ships new filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or clients keep loading stale asset
    # references after a deploy. SPA fallback routes all paths to it.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
